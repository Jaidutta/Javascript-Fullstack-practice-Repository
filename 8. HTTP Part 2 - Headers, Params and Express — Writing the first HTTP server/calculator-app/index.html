<html>
    <body>
        <input type="text" placeholder="first number" id="first"/>
        <input type="text" placeholder="second number" id="second"/>

        <button onclick="add()">Add</button>
        <button>Sub</button>
        <button>Div</button>
        <button>Mul</button>

        <div id="response"></div>
    </body>
    <script>
      async function add() {
      const a = document.getElementById("first").value;
      const b = document.getElementById("second").value;

      // Local calculation (commented out in your image):
      // document.getElementById("response").innerHTML = parseInt(a) + parseInt(b);

      const res = await fetch("http://localhost:3002/sum/" + a + "/" + b);
      const json = await res.json();
      
      document.getElementById("response").innerHTML = `The sum of ${a} + ${b} is: ${json.ans}`;  ;
    }
